name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: causal-chain-triz
  APP_PORT: "3002"
  REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
  REGISTRY_NAMESPACE: chmjk67
  ECS_IP: 39.105.86.184

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Deploy via RunCommand API
        run: |
          python3 -c "
          import json, hmac, hashlib, base64, urllib.request, urllib.parse, uuid, time
          from datetime import datetime, timezone

          AK_ID='${{ secrets.ALIYUN_ACCESS_KEY_ID }}'
          AK_SECRET='${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}'

          def sign(p):
              sp=sorted(p.items()); Q=urllib.parse.quote
              q='&'.join(Q(k,'')+'='+Q(v,'') for k,v in sp)
              s='GET&'+Q('/','')+'&'+Q(q,'')
              sig=base64.b64encode(hmac.new((AK_SECRET+'&').encode(),s.encode(),hashlib.sha1).digest()).decode()
              return q+'&Signature='+Q(sig,'')

          def run_cmd(instance_id, cmd, timeout=120):
              b64=base64.b64encode(cmd.encode()).decode()
              p={'Action':'RunCommand','RegionId':'cn-beijing','InstanceId.1':instance_id,'Type':'RunShellScript','CommandContent':b64,'ContentEncoding':'Base64','Timeout':str(timeout),'Format':'JSON','Version':'2014-05-26','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
              r=urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p),timeout=10)
              iid=json.loads(r.read())['InvokeId']
              print(f'InvokeId: {iid}')
              for _ in range(timeout//3):
                  time.sleep(3)
                  p2={'Action':'DescribeInvocationResults','RegionId':'cn-beijing','InvokeId':iid,'Format':'JSON','Version':'2014-05-26','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
                  r2=urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p2),timeout=10)
                  for res in json.loads(r2.read()).get('Invocation',{}).get('InvocationResults',{}).get('InvocationResult',[]):
                      if res.get('InvocationStatus') in ('Success','Failed','Finished'):
                          o=res.get('Output','') or ''
                          decoded = base64.b64decode(o).decode('utf-8','replace') if o else ''
                          print(decoded)
                          return res.get('InvocationStatus')

          instance_id='i-2zeee6djmc1qhwptmz1l'
          APP_NAME='${{ env.APP_NAME }}'
          APP_PORT='${{ env.APP_PORT }}'
          REGISTRY='${{ env.REGISTRY_URL }}'
          NAMESPACE='${{ env.REGISTRY_NAMESPACE }}'
          REGISTRY_USER='${{ secrets.REGISTRY_USERNAME }}'
          REGISTRY_PASS='${{ secrets.REGISTRY_PASSWORD }}'

          DEEPSEEK_KEY='${{ secrets.DEEPSEEK_API_KEY }}'

          deploy_cmd = f'''docker login --username={REGISTRY_USER} --password={REGISTRY_PASS} {REGISTRY}
          docker pull {REGISTRY}/{NAMESPACE}/{APP_NAME}:latest
          docker stop {APP_NAME}_app 2>/dev/null; docker rm {APP_NAME}_app 2>/dev/null
          docker run -d --name {APP_NAME}_app -p {APP_PORT}:80 --restart always --network caddy-net -e DEEPSEEK_API_KEY={DEEPSEEK_KEY} {REGISTRY}/{NAMESPACE}/{APP_NAME}:latest
          sleep 5
          curl -sf http://127.0.0.1:{APP_PORT}/health && echo HEALTH_OK || echo HEALTH_FAIL
          curl -sf http://127.0.0.1:{APP_PORT}/api/v1/triz/principles | head -c 200'''

          result = run_cmd(instance_id, deploy_cmd)
          print(f'\\nDeploy result: {result}')
          "

      - name: Verify deployment
        run: |
          echo "等待部署完成..."
          sleep 15
          echo "验证 IP:端口 - http://${ECS_IP}:${APP_PORT}/"
          curl -sf "http://${ECS_IP}:${APP_PORT}/" && echo " OK" || echo " FAIL"
          echo "验证健康检查 - http://${ECS_IP}:${APP_PORT}/health"
          curl -sf "http://${ECS_IP}:${APP_PORT}/health" && echo " OK" || echo " FAIL"
